        introBox: {

            html: `<p><strong>(A) Introduction</strong></p>
<p>Dear Sir/Madam,</p>
<p>We are a research team from <strong>VinUniversity and RMIT University Vietnam</strong>, currently conducting an academic study on <strong>Human–AI Collaboration</strong> within organizational and business environments.</p>
<p>This study aims to explore how employees and organizations are adopting AI technologies in their daily work practices, as well as how humans interact, collaborate, and make decisions alongside AI in the context of rapid digital transformation and technological advancement. The research is expected to provide practical insights into the role of AI in modern organizations and support businesses in developing more effective AI adoption and collaboration strategies.</p>
<p>Your participation will provide valuable practical insights for academic research and contribute to a better understanding of the evolving collaboration between humans and AI in contemporary organizations. We will also share the research findings if you are interested.</p>
<p><strong>(B) Confidentiality and Commitment</strong></p>
<p>This survey is conducted solely for academic purposes. There are no right or wrong answers. We kindly ask you to respond based on your actual experiences and personal perceptions in the workplace. All information collected will be kept confidential and used exclusively for research purposes. Survey data will be analyzed in aggregate form only, and no personally identifiable information will be disclosed.</p>
<p>We sincerely appreciate your valuable time, participation, and support in this research.</p>
<p>Any feedback or question, please contact Prof. Hong Bui at <a href="mailto:Hong.btm@vinuni.edu.vn">Hong.btm@vinuni.edu.vn</a></p>`
